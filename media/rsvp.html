<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}';">
  <title>RSVP Reader</title>
  <style nonce="{{nonce}}">

    /* ── Design Tokens ────────────────────────────────────────────── */
    :root {
      --color-surface:    var(--vscode-editor-background, #000);
      --color-text:       var(--vscode-editor-foreground, #e0e0e0);
      --color-text-dim:   var(--vscode-descriptionForeground, rgba(255,255,255,0.3));
      --color-accent:     var(--vscode-terminal-ansiRed, #f14c4c);
      --color-rule:       var(--vscode-editorWidget-border, rgba(255,255,255,0.12));
      --color-focus-ring: var(--vscode-focusBorder);
      --font:             var(--vscode-editor-font-family, 'Courier New', monospace);
      --word-font-size:   3.0rem;
    }

    /* ── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Shell ────────────────────────────────────────────────────── */
    body {
      height: 100vh;
      display: flex;
      align-items: stretch;
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
    }

    #reader {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Spacers — push bands to vertical center ───────────────────── */
    #spacer-top    { flex: 1.4; }
    #spacer-bottom { flex: 1; }

    /* ── Word count — sits above the top rule ──────────────────────── */
    #word-count {
      text-align: center;
      font-size: 0.7rem;
      color: var(--color-text-dim);
      letter-spacing: 0.08em;
      padding-bottom: 1.25rem;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    #word-count.visible { opacity: 1; }

    /* ── Bands (two horizontal rules) ─────────────────────────────── */
    .band {
      position: relative;
      width: 100%;
      height: 1px;
      background: var(--color-rule);
    }

    /* Progress fills the bottom band left-to-right */
    #band-bottom::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: var(--progress, 0%);
      background: var(--color-accent);
      transition: width 80ms linear;
    }

    /* Expanded hit area for seek clicks — ::after so ::before stays for progress */
    #band-bottom {
      cursor: pointer;
    }
    #band-bottom::after {
      content: '';
      position: absolute;
      left: 0; top: -6px;
      width: 100%; height: 13px;
    }

    /* ORP tick marks — extend inward at horizontal center */
    .tick {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 0.5rem;
      background: var(--color-accent);
      opacity: 0.7;
    }
    #band-top    .tick { bottom: 0; }
    #band-bottom .tick { top: 0; }

    /* WPM label — bottom-right of the bottom band */
    #wpm-corner {
      position: absolute;
      right: 1.25rem;
      top: 0.4rem;
      font-size: 0.68rem;
      color: var(--color-text-dim);
      letter-spacing: 0.04em;
      font-style: italic;
    }

    /* ── Word zone ─────────────────────────────────────────────────── */
    #word-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(var(--word-font-size) * 2.2);
    }

    /* ORP alignment handled in JS — offsetLeft measurement after each
       replaceChildren, then translateX to center ORP on tick marks.
       CSS ch-unit math is font-dependent and unreliable across themes. */
    #word-display {
      position: relative; /* makes it offsetParent for child spans */
      display: flex;
      align-items: baseline;
      font-size: var(--word-font-size);
      line-height: 1;
      white-space: pre;
      letter-spacing: 0.03em;
      font-weight: 300;
    }

    .w-orp {
      color: var(--color-accent);
      font-weight: 500;
    }

    /* Onboarding hint — small, dim, centered */
    .w-hint {
      font-size: 0.75rem;
      color: var(--color-text-dim);
      letter-spacing: 0.08em;
      white-space: nowrap;
      font-weight: 300;
    }

    /* Phosphor flash on each new word */
    @keyframes phosphor {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }
    #word-display.flash { animation: phosphor 55ms ease-out forwards; }

    /* Idle cursor blink */
    #idle-cursor {
      display: inline-block;
      width: 0.5em;
      height: var(--word-font-size);
      background: var(--color-accent);
      opacity: 0.35;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0; }
    }

    /* ── Controls ───────────────────────────────────────────────────── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      padding: 0.75rem 1.25rem 1.25rem;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .ctrl-sep {
      width: 1px;
      height: 0.9rem;
      background: var(--color-rule);
      margin: 0 0.2rem;
    }

    .btn {
      padding: 0.3rem 0.65rem;
      background: transparent;
      color: var(--color-text-dim);
      border: 1px solid transparent;
      border-radius: 0.125rem;
      cursor: pointer;
      font-size: 0.72rem;
      font-family: var(--font);
      letter-spacing: 0.04em;
      opacity: 0.65;
      transition: opacity 120ms ease, border-color 120ms ease;
    }
    .btn:hover        { opacity: 1; border-color: var(--color-rule); }
    .btn:active       { opacity: 0.7; }
    .btn:focus-visible {
      outline: 1px solid var(--color-focus-ring);
      outline-offset: 2px;
      opacity: 1;
    }
    .btn:disabled     { opacity: 0.2; cursor: not-allowed; }

    /* Fixed widths for buttons whose text content changes at runtime */
    #btn-play { min-width: 4.5rem; }

    /* Highlighted state for active preset / skim mode */
    .btn.active {
      opacity: 1;
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* WPM slider group */
    #wpm-group {
      display: flex;
      align-items: center;
      margin: 0 0.4rem;
      opacity: 0.65;
      transition: opacity 120ms ease;
    }
    #wpm-group:hover { opacity: 1; }

    #wpm-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 4.5rem;
      height: 1px;
      background: var(--color-rule);
      border-radius: 0;
      cursor: pointer;
      outline: none;
    }
    #wpm-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--color-text-dim);
      border: none;
      cursor: pointer;
    }
    #wpm-slider:focus-visible {
      outline: 1px solid var(--color-focus-ring);
      border-radius: 0;
    }
  </style>
</head>
<body>
  <div id="reader">

    <div id="spacer-top"></div>

    <div id="word-count" aria-live="polite"></div>

    <div class="band" id="band-top">
      <span class="tick" aria-hidden="true"></span>
    </div>

    <div id="word-zone">
      <div id="word-display" role="status" aria-live="off"></div>
    </div>

    <div class="band" id="band-bottom">
      <span class="tick" aria-hidden="true"></span>
      <span id="wpm-corner" aria-live="polite">250 wpm</span>
    </div>

    <div id="spacer-bottom"></div>

    <div id="controls">

      <!-- Navigation row -->
      <div class="ctrl-row">
        <button class="btn" id="btn-back-sentence" title="Back to sentence start (Shift+←)" disabled>← sent</button>
        <button class="btn" id="btn-back"          title="Back words (←)"                   disabled>← 5 words</button>
        <button class="btn" id="btn-play"          title="Play / Pause (Space)"              disabled>▶ play</button>
        <button class="btn" id="btn-forward"       title="Forward words (→)"                 disabled>5 words →</button>
      </div>

      <!-- Speed row -->
      <div class="ctrl-row">
        <button class="btn" id="btn-250" title="250 wpm" disabled>250</button>
        <button class="btn" id="btn-400" title="400 wpm" disabled>400</button>
        <button class="btn" id="btn-600" title="600 wpm" disabled>600</button>
        <div class="ctrl-sep" aria-hidden="true"></div>
        <div id="wpm-group">
          <input id="wpm-slider" type="range" min="100" max="800" step="25" value="250"
                 aria-label="Words per minute">
        </div>
      </div>

      <!-- Display row — always active, no disable needed -->
      <div class="ctrl-row">
        <button class="btn" id="btn-font-down" title="Smaller text">Aa−</button>
        <button class="btn" id="btn-font-up"   title="Larger text">Aa+</button>
        <div class="ctrl-sep" aria-hidden="true"></div>
        <button class="btn" id="btn-mode"      title="Toggle skim mode (1.5× speed)">read</button>
      </div>

    </div>
  </div>

  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
